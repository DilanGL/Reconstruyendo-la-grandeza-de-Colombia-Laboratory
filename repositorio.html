<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio de Recursos - Grandeza Colombia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <div id="navbar-container"></div>

    <main class="flex-1 py-16 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        
        <div class="text-center max-w-3xl mx-auto mb-16">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider bg-blue-100 text-blue-800 mb-4">
                <i class="fa-solid fa-cube mr-1.5"></i> Ecosistema Técnico
            </span>
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight sm:text-5xl">
                Módulos de Transformación Nacional
            </h1>
            <p class="text-lg text-slate-600 mt-4 leading-relaxed">
                Explora el desglose estratégico y los pilares técnicos diseñados para reestructurar el camino crítico del país con precisión y transparencia.
            </p>
        </div>

        <div id="grid-archivos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 text-center border-t border-slate-800">
        <p class="text-sm">Grandeza Colombia © 2026 - Hacia un estándar de excelencia nacional.</p>
    </footer>

    <script src="js/global.js"></script>
</body>
</html>
