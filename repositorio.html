<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio de Recursos - Grandeza Colombia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

   <div id="navbar-container"></div>

    <section id="documentos" class="py-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 pb-6 border-b border-slate-200">
            <div>
                <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Repositorio de Recursos</h2>
                <p class="text-slate-600 mt-2">Accede a los módulos estratégicos, ensayos y material audiovisual del proyecto.</p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-3">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                    <i class="fa-solid fa-file-pdf mr-1"></i> Documentos
                </span>
            </div>
        </div>

        <div id="grid-archivos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </section>

    <footer class="bg-slate-900 text-slate-400 py-12 text-center">
        <p class="text-sm">Grandeza Colombia © 2026 - Hacia un estándar de excelencia nacional.</p>
    </footer>

    <script src="js/global.js"></script>
</body>
</html>
